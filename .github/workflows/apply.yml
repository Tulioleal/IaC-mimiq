name: OpenTofu Apply
on:
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - ".github/workflows/apply.yml"
permissions:
  contents: read
  id-token: write
concurrency:
  group: prod-iac
  cancel-in-progress: false
env:
  TF_INPUT: "0"
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_region: ${{ vars.GCP_REGION }}
  TF_VAR_zone: ${{ vars.GCP_ZONE }}
  TF_VAR_allowed_ssh_cidrs: ${{ vars.ALLOWED_SSH_CIDRS }}
  TF_VAR_bucket_name_prefix: ${{ vars.BUCKET_NAME_PREFIX }}
  TF_VAR_db_user_password: ${{ secrets.TF_VAR_db_user_password }}
  TF_VAR_backend_secret_env: ${{ secrets.TF_VAR_backend_secret_env }}
jobs:
  apply:
    name: Apply production infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
      - name: Format check
        run: tofu fmt -check -recursive -no-color ../..
      - name: Init
        run: tofu init -no-color -input=false -backend-config="bucket=${{ vars.TOFU_STATE_BUCKET }}"
      - name: Validate
        run: tofu validate -no-color
      - name: Plan
        run: tofu plan -no-color -input=false -lock-timeout=5m -out=tfplan
      - name: Apply
        run: tofu apply -no-color -input=false -lock-timeout=5m tfplan
      - name: Outputs
        run: tofu output
