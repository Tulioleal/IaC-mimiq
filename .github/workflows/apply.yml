name: OpenTofu Apply
on:
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - ".github/workflows/tofu-*.yml"
permissions:
  contents: read
  id-token: write
concurrency:
  group: prod-iac
  cancel-in-progress: false
env:
  TF_INPUT: "0"
  TF_CLI_ARGS: "-no-color -input=false"
  TF_VAR_db_user_password: ${{ secrets.TF_VAR_db_user_password }}
  TF_VAR_backend_secret_env: ${{ secrets.TF_VAR_backend_secret_env }}
jobs:
  apply:
    name: Apply production infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
      - name: Format check
        run: tofu fmt -check -recursive ../..
      - name: Init
        run: tofu init -backend-config="bucket=${{ vars.TOFU_STATE_BUCKET }}"
      - name: Validate
        run: tofu validate
      - name: Plan
        run: tofu plan -lock-timeout=5m -out=tfplan
      - name: Apply
        run: tofu apply -lock-timeout=5m tfplan
      - name: Outputs
        run: tofu output
